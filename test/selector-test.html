<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>selector 自测</title>
  </head>
  <body>
    <!-- 各种真实站点里常见的形态，重点是「到处都是 class，且 class 全是构建产物」 -->
    <div class="css-1a2b3c wrapper" id="app">
      <header class="css-9z8y7x">
        <button class="btn btn-primary css-abc123" data-testid="save-btn">保存</button>
        <button class="btn btn-ghost css-abc123">取消</button>
      </header>

      <form class="form-x1y2" id="login-form">
        <label class="lbl" for="username">用户名</label>
        <input class="input css-in-1" id="username" name="username" type="text" placeholder="请输入用户名" />

        <label class="lbl" for=":r7:">动态 id 字段</label>
        <input class="input css-in-2" id=":r7:" name="dynamic_field" type="text" />

        <input class="input css-in-3" id="a1b2c3d4e5f6" name="hashed_id_field" type="text" />

        <select class="sel css-sel" name="country">
          <option value="cn">中国</option>
          <option value="us">美国</option>
        </select>

        <input class="chk" type="checkbox" name="agree" />
        <button class="submit css-sub" type="submit">提交</button>
      </form>

      <!-- 祖先身上挂的状态位（展开/选中/能否交互）和站点自定义标记，是判断当前处于什么状态的
           唯一依据，白名单取属性时全被漏掉了 —— 这里覆盖到 -->
      <ul
        class="list css-list"
        role="listbox"
        aria-expanded="true"
        aria-selected="false"
        tabindex="-1"
        data-chat-id="1510ad46"
        data-state="open"
        hidden=""
        id=":r9:"
        style="margin: 0"
      >
        <li class="item css-item">第一项</li>
        <li class="item css-item">第二项</li>
        <li class="item css-item"><span class="deep css-deep">深层无标识节点</span></li>
      </ul>
    </div>

    <!-- 地标标签应当成为结构路径的起点，而不是从 html > body 一路铺下来 -->
    <nav class="css-nav-1">
      <div class="css-navwrap"><div class="css-navinner">导航容器</div></div>
    </nav>

    <div id="shadow-host"></div>

    <pre id="result">running…</pre>

    <script src="../src/lib/selector.js"></script>
    <script>
      const host = document.getElementById('shadow-host');
      const shadow = host.attachShadow({ mode: 'open' });
      shadow.innerHTML = '<div class="sd-wrap css-sd"><button class="sd-btn css-sd2" data-testid="shadow-btn">影子按钮</button></div>';

      const S = window.__BR_SELECTOR__;
      const results = [];
      const check = (name, fn) => {
        try {
          const detail = fn();
          results.push(`PASS  ${name}${detail ? '  —  ' + detail : ''}`);
        } catch (error) {
          results.push(`FAIL  ${name}  —  ${error.message}`);
        }
      };
      const assert = (cond, msg) => {
        if (!cond) throw new Error(msg);
      };

      const CLASS_PATTERN = /(^|[^\\])\.[A-Za-z_-]|\[class/;

      function allCandidates(el) {
        return S.describe(el).candidates;
      }

      // 1. 没有任何一个候选带 class —— 这是本项目的硬约束
      check('全库无 class 选择器', () => {
        const nodes = document.querySelectorAll('*');
        let checked = 0;
        for (const el of nodes) {
          if (el.tagName === 'SCRIPT' || el.tagName === 'PRE') continue;
          for (const c of allCandidates(el)) {
            assert(!CLASS_PATTERN.test(c.value), `${el.tagName} 生成了 class 选择器：${c.value}`);
          }
          checked += 1;
        }
        return `扫描 ${checked} 个元素`;
      });

      // 2. data-testid 优先
      check('data-testid 排首位', () => {
        const el = document.querySelector('[data-testid="save-btn"]');
        const first = allCandidates(el)[0];
        assert(first.kind === 'testAttr', `首位是 ${first.kind}:${first.value}`);
        return first.value;
      });

      // 3. 稳定 id 被采用
      check('稳定 id 被采用', () => {
        const el = document.getElementById('username');
        const kinds = allCandidates(el).map((c) => c.value);
        assert(kinds.includes('#username'), `候选：${kinds.join(' | ')}`);
        return kinds.slice(0, 2).join(' | ');
      });

      // 4. React useId / hash id 被判为不稳定
      check('动态 id 不被采用', () => {
        assert(S.isUnstableId(':r7:'), ':r7: 应判为不稳定');
        assert(S.isUnstableId('a1b2c3d4e5f6'), 'hash id 应判为不稳定');
        // 注意：结构路径可以拿祖先的稳定 id 当锚点（`#login-form > input:nth-of-type(2)`），
        // 这是允许的；要禁的只是「拿元素自己的动态 id 定位」，即 kind === 'id' 的候选。
        for (const name of ['dynamic_field', 'hashed_id_field']) {
          const el = document.querySelector(`[name="${name}"]`);
          const candidates = allCandidates(el);
          assert(
            !candidates.some((c) => c.kind === 'id'),
            `${name} 不该出现自身 id 候选：${candidates.map((c) => c.value).join(' | ')}`
          );
        }
        return '两个动态 id 字段均已降级到 name / 结构路径';
      });

      // 5. 无任何标识的深层节点退到 nth-of-type 结构路径
      check('无标识节点退到 nth-of-type', () => {
        const el = document.querySelector('.deep');
        const first = allCandidates(el)[0];
        assert(first.kind === 'structural', `实际是 ${first.kind}`);
        assert(first.value.includes('nth-of-type'), `路径未用 nth-of-type：${first.value}`);
        return first.value;
      });

      // 6. 每个候选都必须唯一命中
      check('候选全部唯一命中', () => {
        const targets = ['[data-testid="save-btn"]', '#username', '.deep', 'select', '[type="checkbox"]'];
        let total = 0;
        for (const sel of targets) {
          const el = document.querySelector(sel);
          for (const c of allCandidates(el)) {
            const hit = document.querySelectorAll(c.value);
            assert(hit.length === 1 && hit[0] === el, `${c.value} 命中 ${hit.length} 个`);
            total += 1;
          }
        }
        return `${total} 个候选全部唯一`;
      });

      // 7. describe → resolve 往返
      check('describe/resolve 往返一致', () => {
        const targets = Array.from(document.querySelectorAll('button, input, select, li, span.deep'));
        for (const el of targets) {
          const desc = S.describe(el);
          const { element } = S.resolve(desc);
          assert(element === el, `${el.tagName}${el.name ? '[' + el.name + ']' : ''} 未能解析回原元素`);
        }
        return `${targets.length} 个元素往返成功`;
      });

      // 8. shadow DOM 穿透
      check('shadow DOM 定位', () => {
        const el = shadow.querySelector('[data-testid="shadow-btn"]');
        const desc = S.describe(el);
        assert(desc.shadowPath.length === 1, `shadowPath = ${JSON.stringify(desc.shadowPath)}`);
        const { element } = S.resolve(desc);
        assert(element === el, '未能穿透 shadow DOM 解析');
        return `host: ${desc.shadowPath[0]}`;
      });

      // 9. 第二个同类元素靠结构区分而非 class
      check('同类兄弟靠结构区分', () => {
        const second = document.querySelectorAll('li')[1];
        const desc = S.describe(second);
        const { element } = S.resolve(desc);
        assert(element === second, '第二个 li 解析错位');
        return desc.candidates[0].value;
      });

      // 10. 地标标签当路径起点，别从 html/body 铺
      check('结构路径从地标标签起算', () => {
        const el = document.querySelector('.css-navinner');
        const first = allCandidates(el)[0];
        assert(first.kind === 'structural', `实际是 ${first.kind}`);
        assert(first.value.startsWith('nav'), `路径未从 nav 起算：${first.value}`);
        assert(!/html|body/.test(first.value), `路径含 html/body：${first.value}`);
        return first.value;
      });

      // 11. 祖先链：结构快照不含 class，到 body 即止
      check('祖先链快照无 class 且到 body 止', () => {
        const el = document.querySelector('.deep');
        const chain = S.describe(el).ancestors;
        assert(chain.length > 0, '祖先链为空');
        assert(chain.length <= 10, `超过 10 层：${chain.length}`);
        chain.forEach((a, i) => assert(a.depth === i + 1, `depth 不连续：${JSON.stringify(chain.map((x) => x.depth))}`));

        const dumped = JSON.stringify(chain);
        assert(!/"class"/.test(dumped), `祖先链记录了 class：${dumped}`);
        assert(!/css-/.test(dumped), `祖先链混进了构建 class 值：${dumped}`);

        assert(chain[0].tag === 'li', `直接父应为 li，实际 ${chain[0].tag}`);
        assert(chain[chain.length - 1].tag === 'body', `末层应为 body，实际 ${chain[chain.length - 1].tag}`);
        return chain.map((a) => a.nth).join(' < ');
      });

      // 11b. 祖先属性除 class / style 外全收 —— 白名单会漏掉状态位和站点自定义标记
      check('祖先属性全收，仅排除 class / style / 不稳定 id', () => {
        const el = document.querySelector('.deep');
        const chain = S.describe(el).ancestors;
        const ul = chain.find((a) => a.tag === 'ul');
        assert(ul && ul.attrs, `没拿到 ul 的属性：${JSON.stringify(chain)}`);

        // 白名单里没有、但判断状态必须的
        for (const [name, value] of [
          ['aria-expanded', 'true'],
          ['aria-selected', 'false'],
          ['tabindex', '-1'],
          ['data-chat-id', '1510ad46'],
          ['data-state', 'open']
        ]) {
          assert(ul.attrs[name] === value, `缺属性 ${name}：${JSON.stringify(ul.attrs)}`);
        }
        // 布尔属性「存在」本身就是信息，空值也要记
        assert(ul.attrs.hidden === '', `布尔属性 hidden 未记录：${JSON.stringify(ul.attrs)}`);
        // 白名单原有的不能丢
        assert(ul.attrs.role === 'listbox', `role 丢了：${JSON.stringify(ul.attrs)}`);

        assert(!('class' in ul.attrs), `记了 class：${JSON.stringify(ul.attrs)}`);
        assert(!('style' in ul.attrs), `记了 style：${JSON.stringify(ul.attrs)}`);
        assert(!('id' in ul.attrs), `记了不稳定 id :r9:：${JSON.stringify(ul.attrs)}`);
        return Object.keys(ul.attrs).sort().join(', ');
      });

      // 12. 祖先链要能跨过 shadow 边界，否则组件内的动作只剩一层上下文
      check('祖先链跨 shadow 边界', () => {
        const el = shadow.querySelector('[data-testid="shadow-btn"]');
        const chain = S.describe(el).ancestors;
        const crossed = chain.find((a) => a.shadowHost);
        assert(crossed, `未标记 shadowHost：${JSON.stringify(chain)}`);
        assert(crossed.attrs && crossed.attrs.id === 'shadow-host', `宿主应为 #shadow-host：${JSON.stringify(crossed)}`);
        return `${chain.length} 层，宿主在第 ${crossed.depth} 层`;
      });

      // 13. 超深结构截断在 10 层（用游离 DOM，不污染文档）
      check('祖先链上限 10 层', () => {
        let node = document.createElement('div');
        const root = node;
        for (let i = 0; i < 15; i += 1) {
          const child = document.createElement('div');
          node.appendChild(child);
          node = child;
        }
        const chain = S.buildAncestors(node);
        assert(chain.length === 10, `应截断到 10 层，实际 ${chain.length}`);
        assert(root.contains(node), '前提不成立：游离树未连通');
        return `${chain.length} 层`;
      });

      // 14. 结构路径是所有候选里最脆的一个，失效后要能靠文本兜底
      //     （这条会改动 DOM，放最后跑）
      check('结构路径失效后靠文本兜底', () => {
        const el = document.querySelector('.deep');
        const desc = S.describe(el);
        assert(desc.candidates[0].kind === 'structural', '前提不成立：该节点本应只有结构路径');

        // 插一个包装层，模拟改版时多出一层 div —— nth-of-type 路径就此失效
        const parent = el.parentElement;
        const wrapper = document.createElement('div');
        parent.insertBefore(wrapper, el);
        wrapper.appendChild(el);

        const { element, via } = S.resolve(desc);
        assert(element === el, '结构路径失效后未能找回元素');
        assert(via.kind === 'hint', `兜底方式应为 hint，实际 ${via.kind}`);
        return `via=${via.kind}`;
      });

      const failed = results.filter((r) => r.startsWith('FAIL')).length;
      document.getElementById('result').textContent =
        results.join('\n') + `\n\n===== ${results.length - failed} passed, ${failed} failed =====`;
    </script>
  </body>
</html>
