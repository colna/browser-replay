<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>录制/回放 harness</title>
    <style>
      body { font: 14px/1.6 -apple-system, sans-serif; padding: 32px; max-width: 520px; }
      .css-field-9a8b { margin-bottom: 14px; }
      label { display: block; margin-bottom: 4px; }
      input[type='text'], select { width: 100%; padding: 8px; }
      button { padding: 8px 18px; }
      #summary { font-family: ui-monospace, Menlo, monospace; padding: 8px; background: #f3f3f5; }
    </style>
  </head>
  <body>
    <h1>录制 / 回放 harness</h1>

    <!-- 模拟 SPA 导航栏：多层无标识布局 div，容器带 tabindex 所以点击时会真的拿到焦点。
         这类元素的 focus 不该被录进脚本 —— 它只能退到长结构路径，是最先失效的部分。 -->
    <nav class="css-nav-7h8j">
      <div class="css-navwrap-2k3l" tabindex="-1">
        <div class="css-navinner-9p0q"><div class="css-navitem-4r5t">导航容器</div></div>
      </div>
    </nav>

    <!-- 结构与真实站点对齐：class 全是构建产物、id 有动态的、按钮带 data-testid -->
    <form class="css-form-1x2y" id="demo-form" onsubmit="return false">
      <div class="css-field-9a8b">
        <label for="nickname">昵称</label>
        <input class="css-input-aa11" id="nickname" name="nickname" type="text" placeholder="请输入昵称" />
      </div>

      <div class="css-field-9a8b">
        <label for=":r3:">城市（动态 id）</label>
        <select class="css-select-bb22" id=":r3:" name="city">
          <option value="">请选择</option>
          <option value="beijing">北京</option>
          <option value="shanghai">上海</option>
        </select>
      </div>

      <div class="css-field-9a8b">
        <label><input class="css-check-cc33" type="checkbox" name="agree" value="yes" /> 我已阅读并同意</label>
      </div>

      <div class="css-field-9a8b">
        <label for="remark">备注</label>
        <input class="css-input-ee55" id="remark" name="remark" type="text" />
      </div>

      <button class="css-btn-dd44" data-testid="submit-btn" type="button">提交</button>

      <!-- 真实站点里按钮内部常嵌几层 span（图标 + 文字），点击的事件 target 是最深那个。
           录制器应当上溯到这个带 aria-label 的按钮，而不是记 span 的多层结构路径。 -->
      <button class="css-btn-ee66" aria-label="收藏此项" type="button">
        <span class="css-icon-w1"><span class="css-icon-w2">★</span></span>
        <span class="css-label-w1"><span class="css-label-w2">收藏</span></span>
      </button>
    </form>

    <h3>提交结果</h3>
    <p id="summary">-</p>

    <!-- 模拟 Snapchat / Lexical / Draft.js 这类自绘编辑器，两处与普通 contenteditable 不同：
         1. beforeinput 里 preventDefault，自己维护内容 —— 浏览器因此**不再派发 input 事件**
         2. 真正的内容在内部 model 里，DOM 只是渲染结果，发送时读 model 不读 DOM
         只监听 input 的录制器会完全录不到输入；直接写 textContent 的回放则发出空消息。 -->
    <div class="css-composer-8x3n" role="presentation">
      <div class="css-editwrap-2p" contenteditable="true" placeholder="Send a chat"></div>
      <button class="css-send-1z" type="button">
        <svg class="css-sendicon-4q" viewBox="0 0 16 16" width="16" height="16"><path d="M0 0l16 8-16 8z" /></svg>
      </button>
    </div>

    <h3>已发送</h3>
    <p id="chat-log">-</p>

    <!-- 复刻 Instagram DM（Lexical）实测到的三重故障，缺一条都还原不出「回放发空消息」：
         1. 编辑区埋在十几层单子节点的无标识 div 里，且同构的链条不止一条 —— 结构路径
            匹配到多个元素被判非唯一而丢弃，整步候选归零
         2. beforeinput / input 在 window 捕获阶段被站点吃掉（stopImmediatePropagation），
            录制器**一条输入事件都收不到**，只剩 keydown 这条通道
         3. 每次输入重建内部的 <p> —— 结算时手里的旧节点已脱离文档，读不到值 -->
    <div id="ig-root"></div>
    <h3>IG 已发送</h3>
    <p id="ig-log">-</p>

    <script>
      // ---- chrome API 桩：让未经改动的 content.js 能原样跑在普通页面里 ----
      const collectedSteps = [];
      const messageListeners = [];

      window.chrome = {
        runtime: {
          sendMessage(message) {
            if (message && message.type === 'BR_STEP') collectedSteps.push(message.step);
            return Promise.resolve({ ok: true });
          },
          onMessage: {
            addListener(fn) {
              messageListeners.push(fn);
            }
          }
        }
      };

      function dispatchToContent(message) {
        return new Promise((resolve) => {
          let responded = false;
          const respond = (value) => {
            if (responded) return;
            responded = true;
            resolve(value);
          };
          for (const fn of messageListeners) {
            const async = fn(message, {}, respond);
            if (async !== true && responded) return;
          }
          setTimeout(() => respond({ ok: false, error: 'harness: 无响应' }), 20000);
        });
      }

      // 提交按钮：不跳页，把当前表单值写进 #summary，方便断言「回放后状态 == 录制时状态」
      document.querySelector('[data-testid="submit-btn"]').addEventListener('click', () => {
        const form = document.getElementById('demo-form');
        document.getElementById('summary').textContent =
          `nickname=${form.nickname.value};city=${form.city.value};agree=${form.agree.checked};remark=${form.remark.value}`;
      });

      // ---- 自绘编辑器：内容的真源是 model，DOM 只是它的投影 ----
      const editor = document.querySelector('[placeholder="Send a chat"]');
      const sendBtn = document.querySelector('.css-send-1z');
      let model = '';
      const sentMessages = [];

      function renderEditor() {
        editor.textContent = model;
        // 光标归到末尾，否则下一次输入会插在开头
        const range = document.createRange();
        range.selectNodeContents(editor);
        range.collapse(false);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
      }

      editor.addEventListener('beforeinput', (event) => {
        if (event.inputType === 'insertText' && event.data != null) {
          event.preventDefault();
          model += event.data;
          renderEditor();
        } else if (event.inputType === 'deleteContentBackward') {
          event.preventDefault();
          model = model.slice(0, -1);
          renderEditor();
        } else if (event.inputType === 'insertFromPaste' || event.inputType === 'insertReplacementText') {
          event.preventDefault();
          model = event.data == null ? '' : String(event.data);
          renderEditor();
        }
      });

      function sendMessage() {
        if (!model) return; // 空 model 发不出去 —— 直接改 DOM 的回放会卡在这
        sentMessages.push(model);
        model = '';
        renderEditor();
        document.getElementById('chat-log').textContent = sentMessages.join('|');
      }

      sendBtn.addEventListener('click', sendMessage);
      editor.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          sendMessage();
        }
      });

      function resetChat() {
        model = '';
        sentMessages.length = 0;
        editor.textContent = '';
        document.getElementById('chat-log').textContent = '-';
      }

      function resetForm() {
        const form = document.getElementById('demo-form');
        form.reset();
        document.getElementById('summary').textContent = '-';
        if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
      }

      // ---- IG 风格编辑器：深层无标识 div 汤 + 吞掉输入事件 + 每次输入重建内部节点 ----
      function buildChain(host, depth) {
        let node = host;
        for (let i = 0; i < depth; i += 1) {
          const div = document.createElement('div');
          node.appendChild(div);
          node = div;
        }
        return node;
      }

      const igRoot = document.getElementById('ig-root');
      // 两条同构的 14 层链：结构路径封顶 12 层后是一串裸 div，两边都匹配 —— 非唯一
      const igLeaf = buildChain(igRoot, 14);
      buildChain(igRoot, 14).appendChild(document.createElement('div')); // 同构干扰链

      const igEditor = document.createElement('div');
      igEditor.setAttribute('contenteditable', 'true');
      igEditor.setAttribute('role', 'textbox');
      igEditor.setAttribute('aria-placeholder', '发消息...'); // 白名单外的属性，生成不出候选
      igEditor.setAttribute('tabindex', '0');
      // 给它可点的尺寸：默认空 contenteditable 高度为 0，回放取元素中心点会落到别的元素上
      igEditor.setAttribute('style', 'min-height:28px;min-width:240px;border:1px solid #ccc;padding:4px');
      igLeaf.appendChild(igEditor);

      // 发送按钮：真实场景里用户多半点它而不是按回车，两条路都要能录到输入
      const igSendBtn = document.createElement('div');
      igSendBtn.setAttribute('role', 'button');
      igSendBtn.setAttribute('aria-label', '发送');
      igSendBtn.setAttribute('style', 'min-height:24px;min-width:60px;border:1px solid #ccc');
      igSendBtn.textContent = 'Send';
      igLeaf.appendChild(igSendBtn);
      igSendBtn.addEventListener('click', () => {
        if (igSendBtn.getAttribute('aria-label') === '发送') sendIg();
        else document.getElementById('ig-log').textContent = '录音中'; // 点错按钮的后果要看得见
      });

      // 复刻 Instagram：输入框为空时，发送按钮原地变成麦克风 —— 位置一样，语义完全不同
      function swapIgSendToMic() {
        igSendBtn.setAttribute('aria-label', '录制语音消息');
        igSendBtn.textContent = 'Mic';
      }

      const igSent = [];
      let igModel = '';

      // Lexical 式渲染：每次都换掉内部的 <p>，旧节点随即脱离文档
      function renderIg() {
        igEditor.innerHTML = '';
        const p = document.createElement('p');
        p.textContent = igModel;
        igEditor.appendChild(p);
      }
      renderIg();

      // 站点在捕获阶段吃掉输入事件 —— 注册早于录制器，stopImmediatePropagation 后它收不到
      for (const type of ['beforeinput', 'input']) {
        window.addEventListener(
          type,
          (event) => {
            if (igEditor.contains(event.target) || event.target === igEditor) event.stopImmediatePropagation();
          },
          true
        );
      }

      // 内容由 keydown 自行维护（浏览器默认插入被上面的吞噬绕过后依然发生，这里统一以 model 为准）
      igEditor.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          sendIg(); // 空 model 发不出去 —— 没录到输入的回放会卡在这
          return;
        }
        if (event.key === 'Backspace') {
          event.preventDefault();
          igModel = igModel.slice(0, -1);
          renderIg();
          return;
        }
        if (event.key.length === 1 && !event.ctrlKey && !event.metaKey && !event.altKey) {
          event.preventDefault();
          igModel += event.key;
          renderIg();
        }
      });

      function resetIg(draft) {
        igModel = draft || '';
        igSent.length = 0;
        renderIg();
        document.getElementById('ig-log').textContent = '-';
      }

      // 复刻「站点恢复草稿」：录制开始前编辑区里就已经有内容了
      function seedIgDraft(text) {
        resetIg(text);
      }

      function sendIg() {
        if (!igModel) return;
        igSent.push(igModel);
        igModel = '';
        renderIg();
        document.getElementById('ig-log').textContent = igSent.join('|');
      }

      window.__harness = {
        startRecord: () => dispatchToContent({ type: 'BR_START_RECORD' }),
        stopRecord: async () => {
          await dispatchToContent({ type: 'BR_STOP_RECORD' });
          return collectedSteps.slice();
        },
        steps: () => collectedSteps.slice(),
        clearSteps: () => {
          collectedSteps.length = 0;
        },
        reset: resetForm,
        resetChat,
        resetIg,
        seedIgDraft,
        swapIgSendToMic,
        summary: () => document.getElementById('summary').textContent,
        chatLog: () => document.getElementById('chat-log').textContent,
        igLog: () => document.getElementById('ig-log').textContent,
        // 这里复刻 background 的回放策略：可选步骤（focus/blur/scroll）失败跳过、关键步骤失败中断
        async replay(steps) {
          const log = [];
          for (let i = 0; i < steps.length; i += 1) {
            const result = await dispatchToContent({
              type: 'BR_EXEC_STEP',
              step: steps[i],
              index: i,
              total: steps.length
            });
            const skipped = !result.ok && !!result.optional;
            log.push({ index: i, type: steps[i].type, skipped, ...result });
            if (!result.ok && !skipped) break;
          }
          return log;
        }
      };
    </script>

    <script src="../src/lib/selector.js"></script>
    <script src="../src/lib/waiter.js"></script>
    <script src="../src/lib/keyboard.js"></script>
    <script src="../src/lib/executor.js"></script>
    <script src="../src/content.js"></script>
  </body>
</html>
